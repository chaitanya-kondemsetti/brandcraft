services:
  - type: web
    name: brandcraft
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: IBM_API_KEY
        sync: false
      - key: IBM_URL
        sync: false
